<div class="container" style="padding: 2rem; font-family: sans-serif;">
  <h1>Calendar System: Users</h1>
  
  <div *ngIf="users.length === 0" style="color: #666;">
    <p>Connecting to C# Backend...</p>
    <small>Make sure your .NET app is running on the port in your service!</small>
  </div>

  <table *ngIf="users.length > 0" border="1" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead style="background-color: #f4f4f4;">
      <tr>
        <th style="padding: 10px; text-align: left;">UID</th>
        <th style="padding: 10px; text-align: left;">Name</th>
        <th style="padding: 10px; text-align: left;">Email</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td style="padding: 10px;">{{ user.uid }}</td>
        <td style="padding: 10px;">{{ user.name }}</td>
        <td style="padding: 10px;">{{ user.email }}</td>
      </tr>
    </tbody>
  </table>
</div>

<router-outlet />
