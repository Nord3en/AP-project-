<div class="calendar-page">
    <aside class="sidebar">
        <h2>Classroom</h2>

        <button class="menu-btn">Calendar</button>
        <button class="menu-btn">Subjects</button>
        <button class="menu-btn">Tasks</button>

        <div class="agenda-box">
            <h3>Agenda</h3>
            <p><strong>Today:</strong> No tasks yet</p>
            <p><strong>Tomorrow:</strong> No tasks yet</p>
        </div>

        <button class="logout-btn">Logout</button>
    </aside>

    <main class="calendar-main">
        <div class="calendar-header">
            <button (click)="previousMonth()">&#60;</button>
            <h1>{{ monthName }} {{ year }}</h1>
            <button (click)="nextMonth()">&#62;</button>
        </div>

        <div class="weekdays">
            <div class="weekday" *ngFor="let day of weekDays">
                {{ day }}
            </div>
        </div>

        <div class="calendar-grid">
            <div class="calendar-cell" *ngFor="let day of calendarDays" [class.empty]="!day.isCurrentMonth"
                [class.today]="day.isToday">
                <span *ngIf="day.dayNumber">{{ day.dayNumber }}</span>
            </div>
        </div>
    </main>
</div>
