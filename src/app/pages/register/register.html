<div class="auth-screen">
    <div class="register-card">
        <h2 class="card-header">Create an account</h2>

        <div class="input-section">
            <div class="label-box">Name</div>
            <input type="text" class="custom-input">
        </div>

        <div class="input-section">
            <div class="label-box">Email</div>
            <input type="email" class="custom-input">
        </div>

        <div class="input-section">
            <div class="label-box">Password</div>
            <input type="password" class="custom-input">
        </div>

        <button class="signup-btn" routerLink="/calendar">Sign up</button>

        <p class="footer-text">Already have an account?</p>
        <button class="login-btn" routerLink="/login">Back to Sign In</button>
    </div>
</div>
